general {
    lock_cmd = pidof hyprlock || hyprlock
    # unlock_cmd removed (hyprlock exits on successful auth; SIGUSR1 is for emergencies)
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl -i 0 dispatch dpms on
}

# Optional dim
listener {
    timeout = 150
    on-timeout = brightnessctl set 10%
    on-resume  = brightnessctl set 100%
}

# Lock BEFORE DPMS off to avoid “wake/lock/output” races
listener {
    timeout = 295
    on-timeout = loginctl lock-session
}

listener {
    timeout = 300
    on-timeout = hyprctl -i 0 dispatch dpms off
    on-resume  = hyprctl -i 0 dispatch dpms on
}

listener {
    timeout = 1800
    on-timeout = systemctl suspend
}

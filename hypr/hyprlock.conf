general {
  hide_cursor = true
  no_fade_in = false
}
background {
  path = ~/Pictures/wallpaper/lock.png
  blur_size = 0
  blur_passes = 0
  noise = 0
  contrast = 1.0
  brightness = 1.0
  vibrancy = 0.0
}


# MUCH lighter overlay
background {
  color = rgba(0, 0, 0, 0.18)
}

# Big clock
label {
  text = $TIME
  font_size = 96
  font_family = FiraCode Nerd Font
  color = rgb(205, 214, 244)
  position = 0, 160
  halign = center
  valign = center
}

# Date under clock
label {
  text = cmd[date +"%A, %B %d"]
  font_size = 22
  font_family = FiraCode Nerd Font
  color = rgb(180, 190, 254)
  position = 0, 90
  halign = center
  valign = center
}

# Password input field
input-field {
  size = 300, 52
  position = 0, -40
  halign = center
  valign = center

  outer_color = rgb(137, 180, 250)
  inner_color = rgba(30, 30, 46, 0.9)
  font_color = rgb(205, 214, 244)

  outline_thickness = 3
  dots_center = true
  dots_spacing = 0.3
  dots_size = 0.3

  fade_on_empty = false
  placeholder_text = <span foreground="#7f849c">enter password</span>
}

# Subtle hint text
label {
  text = "locked"
  font_size = 14
  font_family = FiraCode Nerd Font
  color = rgb(127, 132, 156)
  position = 0, -100
  halign = center
  valign = center
}

